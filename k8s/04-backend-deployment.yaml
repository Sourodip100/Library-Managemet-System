apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: library-system
  labels:
    app: backend
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          # Replace with your ECR image URI, e.g.:
          # <account-id>.dkr.ecr.<region>.amazonaws.com/library-backend:latest
          image: 619964165706.dkr.ecr.ap-south-1.amazonaws.com/library-backend:latest
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: library-config
          env:
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: mongo-secret
                  key: MONGO_URI
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: JWT_SECRET
          resources:
            requests:
              cpu: "150m"
              memory: "192Mi"
            limits:
              cpu: "400m"
              memory: "384Mi"
          readinessProbe:
            httpGet:
              path: /readyz
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          # Allows graceful shutdown to finish in-flight requests during rollouts
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]
      terminationGracePeriodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: library-system
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
    - port: 80
      targetPort: 5000
