# WARNING: This is a TEMPLATE. Never commit real secrets to git.
#
# Using MongoDB Atlas (managed) instead of an in-cluster database.
# Get your connection string from Atlas: Database -> Connect -> Drivers,
# it looks like:
#   mongodb+srv://<user>:<password>@<cluster-name>.xxxxx.mongodb.net/library_db?retryWrites=true&w=majority
#
# Generate the real secret at deploy time (do NOT apply this file directly):
#
#   kubectl create secret generic mongo-secret \
#     --namespace=library-system \
#     --from-literal=MONGO_URI='mongodb+srv://<user>:<password>@<cluster>.mongodb.net/library_db?retryWrites=true&w=majority'
#
#   kubectl create secret generic backend-secret \
#     --namespace=library-system \
#     --from-literal=JWT_SECRET=<long-random-string>
#
# Or use a sealed-secrets / External Secrets Operator + AWS Secrets Manager
# integration in production instead of plain Kubernetes Secrets.
#
# The YAML below documents the shape only; base64 values are placeholders
# and MUST be replaced (or just use the kubectl commands above instead).

