apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: library-system

resources:
  - 00-namespace.yaml
  - 02-configmap.yaml
  - 04-backend-deployment.yaml
  - 05-frontend-deployment.yaml
  - 06-ingress.yaml
  - 07-hpa.yaml
  - 08-pdb.yaml
